<div class="tracker-container">
  <h2>💰 BCA Expense Tracker</h2>
  
  <div class="balance-container">
    <h3>Your Balance</h3>
    <h1 id="balance">₹0.00</h1>
  </div>

  <div class="inc-exp-container">
    <div>
      <h4>Income</h4>
      <p id="money-plus" class="money plus">+₹0.00</p>
    </div>
    <div>
      <h4>Expense</h4>
      <p id="money-minus" class="money minus">-₹0.00</p>
    </div>
  </div>

  <h3>History</h3>
  <ul id="list" class="list">
    </ul>

  <h3>Add New Transaction</h3>
  <div class="form">
    <div class="form-control">
      <input type="text" id="text" placeholder="Enter reason... (e.g., Salary, Book)">
    </div>
    <div class="form-control">
      <input type="number" id="amount" placeholder="Amount (Positive = Income, Negative = Expense)">
      <small style="color: #bbb; display: block; margin-top: 5px;">Use minus (-) for expenses (e.g., -500)</small>
    </div>
    <button class="btn" id="add-btn">Add Transaction</button>
  </div>
</div>
